worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    server_tokens      off;
    client_max_body_size 50M;          # product/media uploads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    server {
        listen 80 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Trust the X-Forwarded-* set by EasyPanel's Traefik (real client IP/HTTPS).
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT   $realpath_root;
            fastcgi_param HTTPS           $http_x_forwarded_proto if_not_empty;
            fastcgi_read_timeout 120;

            # Larger header buffers — Laravel web/session routes (e.g. /login)
            # send session + XSRF Set-Cookie headers that overflow nginx's
            # default 4k fastcgi buffer, causing "upstream sent too big header" 502s.
            fastcgi_buffer_size 32k;
            fastcgi_buffers 16 16k;
            fastcgi_busy_buffers_size 64k;
        }

        # Never serve dotfiles (except ACME well-known, handled by Traefik anyway).
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}
